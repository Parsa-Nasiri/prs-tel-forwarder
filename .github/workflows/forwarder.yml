name: Telegram to Rubika Forwarder

on:
  schedule:
    # Every 6 hours at XX:05 UTC (gap after previous run)
    - cron: "5 */6 * * *"
  workflow_dispatch:   # manual trigger for testing

jobs:
  forwarder:
    runs-on: ubuntu-latest
    timeout-minutes: 360   # 6‑hour hard limit

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run forwarder
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          STRING_SESSION: ${{ secrets.STRING_SESSION }}
          RUBIKA_BOT_TOKEN: ${{ secrets.RUBIKA_BOT_TOKEN }}
          ADMIN_CHAT_IDS: ${{ secrets.ADMIN_CHAT_IDS }}
          DATA_REPO_OWNER: ${{ secrets.DATA_REPO_OWNER }}
          DATA_REPO_NAME: ${{ secrets.DATA_REPO_NAME }}
          DATA_REPO_TOKEN: ${{ secrets.DATA_REPO_TOKEN }}
        run: python forwarder.py

      - name: Upload state (for debugging)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: state
          path: state.json
