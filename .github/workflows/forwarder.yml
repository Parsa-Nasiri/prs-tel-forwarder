name: Telegram to Rubika Forwarder

on:
  schedule:
    # Every 6 hours – runs at 00:00, 06:00, 12:00, 18:00 UTC
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  forwarder:
    runs-on: ubuntu-latest
    timeout-minutes: 360   # 6‑hour hard limit

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run forwarder
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          STRING_SESSION: ${{ secrets.STRING_SESSION }}
          RUBIKA_BOT_TOKEN: ${{ secrets.RUBIKA_BOT_TOKEN }}
          RUBIKA_CHAT_ID: ${{ secrets.RUBIKA_CHAT_ID }}
        run: python forwarder.py
